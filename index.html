<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slither Pro Multiplayer - Hyper Games</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #08090f; color: #fff; }
        
        #game-canvas { display: block; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: #0c0d14; cursor: crosshair; }
        
        /* Modal & UI Screens */
        .ui-screen {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(15, 16, 25, 0.95); border: 2px solid #00ffaa;
            box-shadow: 0 0 30px rgba(0, 255, 170, 0.35); border-radius: 16px;
            padding: 30px; text-align: center; width: 90%; max-width: 420px; z-index: 10;
            backdrop-filter: blur(10px);
        }
        .hidden { display: none !important; }
        
        /* Splash Screen Style */
        #screen-splash {
            border-color: #ff0055;
            box-shadow: 0 0 40px rgba(255, 0, 85, 0.4);
        }
        .splash-logo {
            font-size: 2.8rem; font-weight: 900; color: #ff0055;
            text-shadow: 0 0 20px #ff0055, 0 0 40px #ff0055;
            letter-spacing: 3px; margin-bottom: 5px;
        }
        .splash-sub {
            color: #00ffaa; font-size: 0.9rem; font-weight: bold; letter-spacing: 4px; text-transform: uppercase;
        }

        h1 { color: #00ffaa; font-size: 2.2rem; margin-bottom: 10px; text-shadow: 0 0 12px rgba(0, 255, 170, 0.6); letter-spacing: 1.5px; }
        p { color: #94a3b8; font-size: 0.88rem; line-height: 1.4; }
        
        .name-input {
            width: 100%; padding: 14px; margin: 15px 0; border-radius: 10px; border: 1px solid #2a2a4a;
            background: #141526; color: #fff; text-align: center; font-size: 1rem; outline: none; transition: 0.3s;
        }
        .name-input:focus { border-color: #00ffaa; box-shadow: 0 0 10px rgba(0, 255, 170, 0.4); }

        .btn {
            width: 100%; padding: 14px; margin-top: 10px; border-radius: 10px; border: none;
            font-size: 1rem; font-weight: bold; cursor: pointer; transition: all 0.2s ease;
        }
        .btn-primary { background: linear-gradient(135deg, #00ffaa 0%, #0088ff 100%); color: #050b14; }
        .btn-primary:hover { opacity: 0.95; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 255, 170, 0.4); }
        
        #verify-msg-box { font-size: 0.85rem; margin-top: 10px; min-height: 22px; font-weight: 600; }
        
        /* Game HUD Overlay */
        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        #score-board {
            position: absolute; top: 20px; left: 20px; font-size: 1.2rem; font-weight: 800;
            color: #00ffaa; text-shadow: 0 0 8px rgba(0, 0, 0, 0.8); background: rgba(0,0,0,0.5);
            padding: 8px 18px; border-radius: 20px; border: 1px solid rgba(0,255,170,0.3);
        }
        #leaderboard {
            position: absolute; top: 20px; right: 20px; background: rgba(15, 16, 25, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 12px 18px;
            min-width: 160px; text-align: right; font-size: 0.85rem;
        }
        #leaderboard h3 { color: #00ffaa; margin-bottom: 6px; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        .lb-row { display: flex; justify-content: space-between; margin: 4px 0; color: #cbd5e1; }
        .lb-row.me { color: #00ffaa; font-weight: bold; }
        
        #boost-hint {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.5); font-size: 0.8rem; letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <!-- Game HUD -->
    <div id="hud" class="hidden">
        <div id="score-board">Length: <span id="score">10</span></div>
        <div id="leaderboard">
            <h3>Leaderboard</h3>
            <div id="lb-list">
                <div class="lb-row me"><span>1. You</span><span id="lb-score">10</span></div>
            </div>
        </div>
        <div id="boost-hint">HOLD LEFT CLICK / SPACE TO BOOST</div>
    </div>

    <!-- Game Canvas -->
    <canvas id="game-canvas"></canvas>

    <!-- 0️⃣ HYPER GAMES SPLASH SCREEN -->
    <div id="screen-splash" class="ui-screen">
        <div class="splash-logo">HYPER GAMES</div>
        <div class="splash-sub">STUDIOS</div>
        <p style="margin-top: 20px; color: #64748b; font-size: 0.75rem;">Loading resources...</p>
    </div>

    <!-- 1️⃣ EMAIL VERIFICATION SCREEN -->
    <div id="screen-mobile-verify" class="ui-screen hidden">
        <h1>VERIFY EMAIL</h1>
        <p>Verify your email address to log in and play Slither Pro Multiplayer.</p>
        
        <div id="verify-msg-box"></div>

        <!-- Step 1: Email Input & Send OTP Button -->
        <div id="phone-step">
            <input type="email" id="user-email-id" class="name-input" placeholder="Enter Your Email Address" autocomplete="off">
            <button id="send-otp-btn" class="btn btn-primary" onclick="requestOtp()">Send OTP</button>
        </div>

        <!-- Step 2: OTP Input & Timer (Shown after clicking Send OTP) -->
        <div id="otp-step" style="display: none;">
            <p style="color: #00ffaa; margin-bottom: 10px; font-weight: 500;">Enter the 6-digit code sent to your email</p>
            <input type="number" id="user-otp-code" class="name-input" placeholder="Enter 6-Digit OTP" maxlength="6">
            <button class="btn btn-primary" onclick="verifyOtp()">Verify & Continue</button>
            
            <div id="otp-timer-container" style="color: #94a3b8; font-size: 0.85rem; margin-top: 15px;">
                Resend OTP in <span id="timer-countdown" style="color: #00ffaa; font-weight: bold;">60</span>s
            </div>
            <button id="resend-otp-btn" class="btn hidden" style="background: #1e1e38; color: #fff; font-size: 0.85rem; border: 1px solid #3b3b6d; margin-top: 15px;" onclick="resendOtp()">Resend OTP</button>
        </div>
    </div>

    <!-- 2️⃣ MAIN MENU SCREEN -->
    <div id="screen-main" class="ui-screen hidden">
        <h1>SLITHER PRO</h1>
        <p id="user-welcome-tag" style="color: #00ffaa; font-weight: bold; margin-bottom: 5px;"></p>
        <input type="text" id="player-nickname" class="name-input" placeholder="Enter Nickname" maxlength="12" value="SlitherMaster">
        <button class="btn btn-primary" onclick="startGame()">PLAY GAME</button>
    </div>

    <script>
        const socket = io();
        let verifiedEmail = localStorage.getItem("VERIFIED_EMAIL") || "";
        let pendingEmail = "";
        let otpTimerInterval = null;

        // Auto Splash Screen -> then Verification / Main Menu Logic
        window.onload = () => {
            showScreen('screen-splash');

            setTimeout(() => {
                if (verifiedEmail) {
                    showScreen('screen-main');
                    document.getElementById('user-welcome-tag').innerText = "Logged in: " + verifiedEmail;
                } else {
                    showScreen('screen-mobile-verify');
                }
            }, 2500); // 2.5 Seconds Splash Time
        };

        function showScreen(screenId) {
            document.querySelectorAll('.ui-screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(screenId).classList.remove('hidden');
        }

        function showVerifyMessage(msg, isError = true) {
            let box = document.getElementById('verify-msg-box');
            box.style.color = isError ? '#ff3366' : '#00ffaa';
            box.innerText = msg;
        }

        // --- OTP FLOW LOGIC ---
        function requestOtp() {
            let emailInput = document.getElementById('user-email-id').value.trim();
            if (!emailInput.includes('@') || !emailInput.includes('.')) {
                showVerifyMessage("Please enter a valid email address!", true);
                return;
            }
            showVerifyMessage("Sending verification code... Please wait.", false);
            pendingEmail = emailInput;
            socket.emit('request-otp', { email: pendingEmail });
        }

        socket.on('otp-sent-success', () => {
            showVerifyMessage("Verification code sent to your email inbox!", false);
            document.getElementById('phone-step').style.display = 'none';
            document.getElementById('otp-step').style.display = 'block';
            startOtpTimer();
        });

        socket.on('otp-sent-error', (errData) => {
            showVerifyMessage(errData.message || "Failed to send OTP.", true);
        });

        function startOtpTimer() {
            let timeLeft = 60;
            let timerSpan = document.getElementById('timer-countdown');
            let timerContainer = document.getElementById('otp-timer-container');
            let resendBtn = document.getElementById('resend-otp-btn');

            timerContainer.style.display = 'block';
            resendBtn.classList.add('hidden');
            timerSpan.innerText = timeLeft;

            if (otpTimerInterval) clearInterval(otpTimerInterval);

            otpTimerInterval = setInterval(() => {
                timeLeft--;
                timerSpan.innerText = timeLeft;
                
                if (timeLeft <= 0) {
                    clearInterval(otpTimerInterval);
                    timerContainer.style.display = 'none';
                    resendBtn.classList.remove('hidden');
                }
            }, 1000);
        }

        function resendOtp() {
            showVerifyMessage("Resending verification code...", false);
            socket.emit('request-otp', { email: pendingEmail });
            startOtpTimer();
        }

        function verifyOtp() {
            let otpInput = document.getElementById('user-otp-code').value.trim();
            if (otpInput.length !== 6 || isNaN(otpInput)) {
                showVerifyMessage("Please enter a 6-digit valid code!", true);
                return;
            }
            socket.emit('verify-otp', { email: pendingEmail, otp: otpInput });
        }

        socket.on('otp-verification-success', (data) => {
            if (otpTimerInterval) clearInterval(otpTimerInterval);
            verifiedEmail = data.email;
            localStorage.setItem("VERIFIED_EMAIL", verifiedEmail);
            showVerifyMessage("Email Verified Successfully!", false);
            setTimeout(() => { 
                showScreen('screen-main');
                document.getElementById('user-welcome-tag').innerText = "Logged in: " + verifiedEmail;
            }, 800);
        });

        socket.on('otp-verification-failed', () => {
            showVerifyMessage("Invalid verification code! Try again.", true);
        });

        // --- 🐍 SLITHER GAME ENGINE ---
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const WORLD_SIZE = 3000;
        let gameRunning = false;
        let isBoosting = false;
        
        let mouse = { x: canvas.width / 2, y: canvas.height / 2 };
        let camera = { x: WORLD_SIZE / 2, y: WORLD_SIZE / 2 };

        let mySnake = {
            id: null,
            name: "Player",
            x: WORLD_SIZE / 2,
            y: WORLD_SIZE / 2,
            angle: 0,
            speed: 3,
            length: 15,
            body: [],
            color: '#00ffaa'
        };

        for (let i = 0; i < mySnake.length; i++) {
            mySnake.body.push({ x: mySnake.x - i * 5, y: mySnake.y });
        }

        let foods = [];
        const FOOD_COUNT = 300;

        function initFoods() {
            foods = [];
            for (let i = 0; i < FOOD_COUNT; i++) {
                foods.push({
                    x: Math.random() * (WORLD_SIZE - 100) + 50,
                    y: Math.random() * (WORLD_SIZE - 100) + 50,
                    radius: Math.random() * 3 + 3,
                    color: `hsl(${Math.random() * 360}, 100%, 60%)`
                });
            }
        }
        initFoods();

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        window.addEventListener('mousedown', () => { isBoosting = true; });
        window.addEventListener('mouseup', () => { isBoosting = false; });
        window.addEventListener('keydown', (e) => { if (e.code === 'Space') isBoosting = true; });
        window.addEventListener('keyup', (e) => { if (e.code === 'Space') isBoosting = false; });

        function startGame() {
            let nick = document.getElementById('player-nickname').value.trim() || "SlitherMaster";
            mySnake.name = nick;
            
            document.querySelectorAll('.ui-screen').forEach(s => s.classList.add('hidden'));
            document.getElementById('hud').classList.remove('hidden');
            
            gameRunning = true;
            socket.emit('joinMultiplayer', { name: nick, x: mySnake.x, y: mySnake.y });
            requestAnimationFrame(gameLoop);
        }

        function gameLoop() {
            if (!gameRunning) return;

            let targetAngle = Math.atan2(mouse.y - canvas.height / 2, mouse.x - canvas.width / 2);
            
            let diff = targetAngle - mySnake.angle;
            while (diff < -Math.PI) diff += Math.PI * 2;
            while (diff > Math.PI) diff -= Math.PI * 2;
            mySnake.angle += diff * 0.1;

            let currentSpeed = isBoosting && mySnake.length > 10 ? 6 : 3;
            if (isBoosting && mySnake.length > 10) {
                mySnake.length -= 0.05;
            }

            mySnake.x += Math.cos(mySnake.angle) * currentSpeed;
            mySnake.y += Math.sin(mySnake.angle) * currentSpeed;

            mySnake.x = Math.max(50, Math.min(WORLD_SIZE - 50, mySnake.x));
            mySnake.y = Math.max(50, Math.min(WORLD_SIZE - 50, mySnake.y));

            camera.x = mySnake.x;
            camera.y = mySnake.y;

            mySnake.body.unshift({ x: mySnake.x, y: mySnake.y });
            while (mySnake.body.length > mySnake.length * 2.5) {
                mySnake.body.pop();
            }

            for (let i = foods.length - 1; i >= 0; i--) {
                let f = foods[i];
                let dist = Math.hypot(mySnake.x - f.x, mySnake.y - f.y);
                if (dist < 18) {
                    mySnake.length += 1;
                    foods[i] = {
                        x: Math.random() * (WORLD_SIZE - 100) + 50,
                        y: Math.random() * (WORLD_SIZE - 100) + 50,
                        radius: Math.random() * 3 + 3,
                        color: `hsl(${Math.random() * 360}, 100%, 60%)`
                    };
                }
            }

            let currentScore = Math.floor(mySnake.length);
            document.getElementById('score').innerText = currentScore;
            document.getElementById('lb-score').innerText = currentScore;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(canvas.width / 2 - camera.x, canvas.height / 2 - camera.y);

            drawGrid();

            for (let f of foods) {
                ctx.beginPath();
                ctx.arc(f.x, f.y, f.radius, 0, Math.PI * 2);
                ctx.fillStyle = f.color;
                ctx.shadowBlur = 8;
                ctx.shadowColor = f.color;
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            for (let i = mySnake.body.length - 1; i >= 0; i--) {
                let seg = mySnake.body[i];
                ctx.beginPath();
                ctx.arc(seg.x, seg.y, 12, 0, Math.PI * 2);
                ctx.fillStyle = i === 0 ? '#00ffaa' : '#00aeff';
                ctx.fill();
            }

            let head = mySnake.body[0];
            if (head) {
                let eyeOffsetAngle = 0.5;
                let eyeDist = 7;
                
                let eye1X = head.x + Math.cos(mySnake.angle - eyeOffsetAngle) * eyeDist;
                let eye1Y = head.y + Math.sin(mySnake.angle - eyeOffsetAngle) * eyeDist;
                ctx.beginPath();
                ctx.arc(eye1X, eye1Y, 3, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();

                let eye2X = head.x + Math.cos(mySnake.angle + eyeOffsetAngle) * eyeDist;
                let eye2Y = head.y + Math.sin(mySnake.angle + eyeOffsetAngle) * eyeDist;
                ctx.beginPath();
                ctx.arc(eye2X, eye2Y, 3, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();
            }

            ctx.font = 'bold 12px Segoe UI';
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.fillText(mySnake.name, mySnake.x, mySnake.y - 20);

            ctx.restore();

            socket.emit('updatePlayer', {
                x: mySnake.x,
                y: mySnake.y,
                angle: mySnake.angle,
                score: currentScore,
                body: mySnake.body
            });

            requestAnimationFrame(gameLoop);
        }

        function drawGrid() {
            ctx.strokeStyle = '#ff3366';
            ctx.lineWidth = 8;
            ctx.strokeRect(0, 0, WORLD_SIZE, WORLD_SIZE);

            ctx.strokeStyle = '#181a29';
            ctx.lineWidth = 1;
            let gridSize = 60;

            for (let x = 0; x <= WORLD_SIZE; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, WORLD_SIZE);
                ctx.stroke();
            }

            for (let y = 0; y <= WORLD_SIZE; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(WORLD_SIZE, y);
                ctx.stroke();
            }
        }
    </script>
</body>
</html>
