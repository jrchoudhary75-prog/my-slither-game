<!DOCTYPE html>
<html>
<head>
    <title>Slither.io Pro - Global Arena</title>
    <style>
        body { margin: 0; background: #030308; overflow: hidden; font-family: sans-serif; user-select: none; color: #fff; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        .ui-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #0a0a1f; z-index: 10; }
        .hidden { display: none; }
        h1 { font-size: 3rem; margin: 0 0 20px 0; color: #00ffaa; }
        .btn { background: #00ffaa; color: #000; padding: 12px 30px; font-size: 1.2rem; font-weight: bold; cursor: pointer; border-radius: 25px; border: none; margin-top: 15px; }
        .name-input { padding: 12px; width: 250px; border-radius: 10px; border: 1px solid #363659; background: #131324; color: #fff; text-align: center; font-size: 1.1rem; }
        #hud { position: absolute; top: 20px; left: 20px; z-index: 5; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px; display: none; }
        #leaderboard { position: absolute; top: 20px; right: 20px; z-index: 5; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; width: 200px; display: none; }
        .lb-title { font-weight: bold; border-bottom: 1px solid #fff; padding-bottom: 5px; margin-bottom: 5px; color: #00bfff; }
        .lb-row { display: flex; justify-content: space-between; font-size: 0.9rem; margin: 3px 0; }
        .active-player { color: #00ffaa; font-weight: bold; }
    </style>
</head>
<body>

    <div id="screen-main" class="ui-screen">
        <h1>SLITHER PRO MULTIPLAYER</h1>
        <input type="text" id="player-nick" class="name-input" placeholder="Enter Name" value="Player_X">
        <button class="btn" onclick="launchGame()">SPAWN IN ARENA</button>
    </div>

    <div id="screen-gameover" class="ui-screen hidden">
        <h1 style="color: #ff3333;">GAME OVER</h1>
        <p id="final-score" style="font-size: 1.5rem;">Score: 0</p>
        <button class="btn" onclick="location.reload()">Play Again</button>
    </div>

    <div id="hud">
        <div id="hud-score" style="font-size: 20px; color: #00ffaa;">Score: 0</div>
    </div>

    <div id="leaderboard">
        <div class="lb-title">Leaderboard</div>
        <div id="lb-content"></div>
    </div>

    <canvas id="game"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const socket = io();

        let isGameRunning = false;
        let mouse = { x: window.innerWidth/2, y: window.innerHeight/2 };
        let currentServerPlayers = {};
        let currentServerFoods = [];
        let currentServerBots = [];

        let clientSnake = { x: 0, y: 0, angle: 0, score: 0, length: 45, currentRadius: 15, body: [] };

        window.addEventListener("mousemove", (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });

        socket.on('serverGameStateUpdate', (data) => {
            currentServerPlayers = data.players;
            currentServerFoods = data.foods;
            currentServerBots = data.bots;
        });

        socket.on('forceClientGameOver', () => {
            isGameRunning = false;
            document.getElementById('hud').style.display = 'none';
            document.getElementById('leaderboard').style.display = 'none';
            document.getElementById('final-score').innerText = "Final Score: " + Math.floor(clientSnake.score);
            document.getElementById('screen-gameover').classList.remove('hidden');
        });

        function launchGame() {
            document.getElementById('screen-main').classList.add('hidden');
            document.getElementById('hud').style.display = 'block';
            document.getElementById('leaderboard').style.display = 'block';
            
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            let rx = (Math.random() - 0.5) * 1000;
            let ry = (Math.random() - 0.5) * 1000;
            clientSnake = {
                x: rx, y: ry, angle: 0, score: 0, length: 45, currentRadius: 15,
                body: Array(45).fill({x: rx, y: ry})
            };

            socket.emit('joinMultiplayer', { name: document.getElementById('player-nick').value });
            isGameRunning = true;
            runGameLoop();
        }

        function runGameLoop() {
            if (!isGameRunning) return;
            requestAnimationFrame(runGameLoop);

            // Handle Turning Angle
            let targetAngle = Math.atan2(mouse.y - canvas.height/2, mouse.x - canvas.width/2);
            let angleDiff = targetAngle - clientSnake.angle;
            while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
            while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
            clientSnake.angle += Math.max(-0.08, Math.min(0.08, angleDiff));

            clientSnake.x += Math.cos(clientSnake.angle) * 3.5;
            clientSnake.y += Math.sin(clientSnake.angle) * 3.5;

            // Follow tail
            let head = { x: clientSnake.x, y: clientSnake.y };
            clientSnake.body.unshift(head);
            if (clientSnake.body.length > clientSnake.length) {
                clientSnake.body.pop();
            }

            // Sync with server
            socket.emit('updatePlayerMovement', {
                x: clientSnake.x, y: clientSnake.y, angle: clientSnake.angle,
                body: clientSnake.body, score: clientSnake.score, length: clientSnake.length, isBoosting: false
            });

            // Local Food Check
            currentServerFoods.forEach(f => {
                let dist = Math.sqrt(Math.pow(clientSnake.x - f.x, 2) + Math.pow(clientSnake.y - f.y, 2));
                if (dist < clientSnake.currentRadius + 6) {
                    clientSnake.score += f.value;
                    clientSnake.length = 45 + Math.floor(clientSnake.score / 5); // 5 score = 1 segment
                    socket.emit('foodEatenIndex', f.id);
                }
            });

            // Local Collision Checks
            for (let id in currentServerPlayers) {
                if (id !== socket.id) {
                    let p = currentServerPlayers[id];
                    for (let j = 3; j < p.body.length; j++) {
                        let d = Math.sqrt(Math.pow(clientSnake.x - p.body[j].x, 2) + Math.pow(clientSnake.y - p.body[j].y, 2));
                        if (d < clientSnake.currentRadius + 10) {
                            socket.emit('playerExplodedDeath');
                            return;
                        }
                    }
                }
            }

            currentServerBots.forEach(b => {
                for(let j = 3; j < b.body.length; j++) {
                    let d = Math.sqrt(Math.pow(clientSnake.x - b.body[j].x, 2) + Math.pow(clientSnake.y - b.body[j].y, 2));
                    if(d < clientSnake.currentRadius + 10) {
                        socket.emit('playerExplodedDeath');
                        return;
                    }
                }
            });

            // Rendering Screen
            ctx.fillStyle = '#0a0a1f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.translate(-clientSnake.x, -clientSnake.y);

            // Draw Food
            currentServerFoods.forEach(f => {
                ctx.fillStyle = f.color; ctx.beginPath(); ctx.arc(f.x, f.y, f.maxRadius, 0, Math.PI*2); ctx.fill();
            });

            // Draw Other Players
            for (let id in currentServerPlayers) {
                if (id !== socket.id) {
                    let p = currentServerPlayers[id];
                    p.body.forEach(seg => {
                        ctx.fillStyle = '#0066ff'; ctx.beginPath(); ctx.arc(seg.x, seg.y, 15, 0, Math.PI*2); ctx.fill();
                    });
                }
            }

            // Draw Server Bots
            currentServerBots.forEach(b => {
                b.body.forEach(seg => {
                    ctx.fillStyle = '#ffaa00'; ctx.beginPath(); ctx.arc(seg.x, seg.y, b.currentRadius, 0, Math.PI*2); ctx.fill();
                });
            });

            // Draw Client
            clientSnake.body.forEach((seg, idx) => {
                ctx.fillStyle = (idx === 0) ? '#00ff77' : '#00ffaa';
                ctx.beginPath(); ctx.arc(seg.x, seg.y, clientSnake.currentRadius, 0, Math.PI*2); ctx.fill();
            });

            ctx.restore();

            document.getElementById('hud-score').innerText = "Score: " + Math.floor(clientSnake.score);

            // Leaderboard Update
            let lbPool = [{name: document.getElementById('player-nick').value || "You", score: clientSnake.score, isLocal: true}];
            for(let id in currentServerPlayers) { if(id !== socket.id) lbPool.push({name: currentServerPlayers[id].name, score: currentServerPlayers[id].score}); }
            currentServerBots.forEach(b => lbPool.push({name: b.name, score: b.score}));
            lbPool.sort((a,b) => b.score - a.score);

            let lbContent = "";
            lbPool.slice(0, 7).forEach((item, idx) => {
                lbContent += `<div class="lb-row ${item.isLocal ? 'active-player' : ''}"><span>${idx+1}. ${item.name}</span><span>${Math.floor(item.score)}</span></div>`;
            });
            document.getElementById('lb-content').innerHTML = lbContent;
        }
    </script>
</body>
</html>
