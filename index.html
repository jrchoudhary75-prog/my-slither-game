<!DOCTYPE html>
<html>
<head>
    <title>Slither.io Pro - MultiMode Cluster</title>
    <style>
        body { margin: 0; background: #030308; overflow: hidden; font-family: 'Segoe UI', sans-serif; user-select: none; color: #fff; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        .ui-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle at center, #0f0f24 0%, #03030a 100%); z-index: 10; }
        .hidden { display: none !important; }
        h1 { font-size: 3.5rem; font-weight: 900; margin: 0 0 20px 0; text-transform: uppercase; letter-spacing: 5px; background: linear-gradient(45deg, #00ffaa, #00bfff, #ff0077); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .setup-box { background: rgba(255, 255, 255, 0.03); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.06); text-align: center; }
        .name-input { padding: 12px; width: 280px; border-radius: 12px; border: 1px solid #363659; background: #131324; color: #fff; text-align: center; font-size: 1.1rem; margin-bottom: 20px; }
        .mode-container { display: flex; gap: 20px; justify-content: center; }
        .btn { background: linear-gradient(135deg, #1f1f3d 0%, #0b0b14 100%); border: 1px solid #3d3d75; color: white; padding: 14px 30px; font-size: 1.1rem; font-weight: bold; cursor: pointer; border-radius: 25px; min-width: 180px; transition: all 0.2s; }
        .btn:hover { background: linear-gradient(135deg, #00ffaa 0%, #00bfff 100%); color: #000; border-color: #fff; transform: translateY(-2px); }
        .btn-offline { border-color: #ffaa00; }
        .btn-offline:hover { background: linear-gradient(135deg, #ffaa00 0%, #ff5500 100%); color: #fff; }
        #hud { position: absolute; top: 20px; left: 20px; z-index: 5; background: rgba(3,3,10,0.8); padding: 15px 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.06); display: none; }
        #leaderboard { position: absolute; top: 20px; right: 20px; z-index: 5; background: rgba(3,3,10,0.85); padding: 15px 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.06); width: 220px; display: none; }
        .lb-title { font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; color: #38bdf8; }
        .lb-row { display: flex; justify-content: space-between; margin: 4px 0; font-size: 0.9rem; }
        .active-player { color: #00ffaa; font-weight: bold; }
    </style>
</head>
<body>

    <!-- Selection Scene Launcher Hub -->
    <div id="screen-main" class="ui-screen">
        <h1>SLITHER PRO</h1>
        <div class="setup-box">
            <input type="text" id="player-nick" class="name-input" placeholder="Enter Nickname" value="Player_X"><br/>
            <div class="mode-container">
                <button class="btn btn-offline" onclick="launchGame('offline')">OFFLINE BOTS MODE</button>
                <button class="btn" onclick="launchGame('multiplayer')">ONLINE MULTIPLAYER</button>
            </div>
        </div>
    </div>

    <!-- Wasted Panel -->
    <div id="screen-gameover" class="ui-screen hidden">
        <h1 style="color: #ff3333; font-size: 4rem;">WASTED</h1>
        <p id="final-score" style="font-size: 1.5rem; color: #cbd5e1;">Score: 0</p>
        <button class="btn" onclick="location.reload()">Return to Hub</button>
    </div>

    <!-- HUD -->
    <div id="hud">
        <div id="hud-score" style="font-size: 22px; font-weight: bold; color: #00ffaa;">Score: 0</div>
        <div id="hud-mode" style="font-size: 12px; color: #a0aec0; margin-top:2px;">Mode: None</div>
    </div>

    <div id="leaderboard">
        <div class="lb-title">Arena Standings</div>
        <div id="lb-content"></div>
    </div>

    <canvas id="game"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const socket = io();

        let isGameRunning = false;
        let gameMode = 'offline'; // 'offline' or 'multiplayer'
        let mouse = { x: window.innerWidth/2, y: window.innerHeight/2 };
        let isBoosting = false;

        // Sync Vectors
        let currentServerPlayers = {};
        let currentServerFoods = [];
        let offlineBots = [];
        let offlineFoods = [];

        let clientSnake = { x: 0, y: 0, angle: 0, score: 0, length: 45, currentRadius: 15, body: [] };
        const MAP_RADIUS = 2500;

        window.addEventListener("mousemove", (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener("mousedown", () => { if(isGameRunning && clientSnake.score > 5) isBoosting = true; });
        window.addEventListener("mouseup", () => { isBoosting = false; });

        socket.on('serverGameStateUpdate', (data) => {
            if (gameMode === 'multiplayer') {
                currentServerPlayers = data.players;
                currentServerFoods = data.foods;
            }
        });

        socket.on('forceClientGameOver', () => { if(gameMode === 'multiplayer') triggerGameOver(); });

        function launchGame(mode) {
            gameMode = mode;
            document.getElementById('screen-main').classList.add('hidden');
            document.getElementById('hud').style.display = 'block';
            document.getElementById('leaderboard').style.display = 'block';
            document.getElementById('hud-mode').innerText = "Mode: " + mode.toUpperCase();

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            let rx = (Math.random() - 0.5) * 600;
            let ry = (Math.random() - 0.5) * 600;
            clientSnake = {
                x: rx, y: ry, angle: 0, score: 0, length: 45, currentRadius: 15,
                body: Array(45).fill({x: rx, y: ry})
            };

            if (mode === 'offline') {
                // Initialize Offline Context Local Variables
                offlineFoods = [];
                for(let i=0; i<300; i++) {
                    offlineFoods.push({
                        id: i, x: (Math.random()-0.5)*MAP_RADIUS*1.5, y: (Math.random()-0.5)*MAP_RADIUS*1.5,
                        color: `hsl(${Math.random()*360},100%,60%)`, radius: 6, value: 1
                    });
                }
                offlineBots = [];
                for(let i=0; i<12; i++) {
                    let bx = (Math.random()-0.5)*MAP_RADIUS; let by = (Math.random()-0.5)*MAP_RADIUS;
                    offlineBots.push({
                        name: "AI_Bot_" + Math.floor(Math.random()*900),
                        x: bx, y: by, angle: Math.random()*Math.PI*2,
                        score: 0, length: 45, currentRadius: 15, body: Array(45).fill({x: bx, y: by})
                    });
                }
            } else {
                socket.emit('joinMultiplayer', { name: document.getElementById('player-nick').value });
            }

            isGameRunning = true;
            runGameLoop();
        }

        function triggerGameOver() {
            isGameRunning = false;
            document.getElementById('hud').style.display = 'none';
            document.getElementById('leaderboard').style.display = 'none';
            document.getElementById('final-score').innerText = "Final Score: " + Math.floor(clientSnake.score);
            document.getElementById('screen-gameover').classList.remove('hidden');
        }

        function runGameLoop() {
            if (!isGameRunning) return;
            requestAnimationFrame(runGameLoop);

            // 1. Boost Processing Logic
            if (isBoosting && clientSnake.score > 5) {
                clientSnake.score -= 0.08;
                clientSnake.length = 45 + Math.floor(clientSnake.score / 5);
            } else { isBoosting = false; }

            let speed = isBoosting ? 6.5 : 3.5;

            // 2. Dynamic Smooth Turning Angle
            let targetAngle = Math.atan2(mouse.y - canvas.height/2, mouse.x - canvas.width/2);
            let angleDiff = targetAngle - clientSnake.angle;
            while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
            while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
            clientSnake.angle += Math.max(-0.07, Math.min(0.07, angleDiff));

            clientSnake.x += Math.cos(clientSnake.angle) * speed;
            clientSnake.y += Math.sin(clientSnake.angle) * speed;

            // 3. FIXED: Distance-based Body Follow Logic (Gaps strictly closed)
            let head = { x: clientSnake.x, y: clientSnake.y };
            clientSnake.body[0] = head;
            let spacing = 6; 
            for (let i = 1; i < clientSnake.body.length; i++) {
                let dx = clientSnake.body[i].x - clientSnake.body[i-1].x;
                let dy = clientSnake.body[i].y - clientSnake.body[i-1].y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > spacing && dist > 0) {
                    clientSnake.body[i].x = clientSnake.body[i-1].x + (dx / dist) * spacing;
                    clientSnake.body[i].y = clientSnake.body[i-1].y + (dy / dist) * spacing;
                }
            }
            while(clientSnake.body.length < clientSnake.length) clientSnake.body.push({x: clientSnake.x, y: clientSnake.y});
            while(clientSnake.body.length > clientSnake.length) clientSnake.body.pop();

            // 4. Mode Actions Routing
            if (gameMode === 'offline') {
                // Offline Local Food Eating Loop
                offlineFoods.forEach(f => {
                    let d = Math.sqrt(Math.pow(clientSnake.x - f.x, 2) + Math.pow(clientSnake.y - f.y, 2));
                    if(d < clientSnake.currentRadius + f.radius) {
                        clientSnake.score += f.value;
                        clientSnake.length = 45 + Math.floor(clientSnake.score / 5);
                        f.x = (Math.random()-0.5)*MAP_RADIUS*1.5;
                        f.y = (Math.random()-0.5)*MAP_RADIUS*1.5;
                    }
                });

                // Move Offline Local AI Bots
                offlineBots.forEach(b => {
                    if(Math.random() < 0.03) b.angle = Math.random()*Math.PI*2;
                    b.x += Math.cos(b.angle) * 3.0; b.y += Math.sin(b.angle) * 3.0;
                    
                    let bHead = { x: b.x, y: b.y };
                    b.body.unshift(bHead);
                    if(b.body.length > b.length) b.body.pop();

                    // Check if player crashes into offline bot body
                    for (let j = 3; j < b.body.length; j++) {
                        let d = Math.sqrt(Math.pow(clientSnake.x - b.body[j].x, 2) + Math.pow(clientSnake.y - b.body[j].y, 2));
                        if (d < clientSnake.currentRadius + 10) { triggerGameOver(); return; }
                    }
                });
            } else {
                // Online Multiplayer Context Pipeline
                socket.emit('updatePlayerMovement', {
                    x: clientSnake.x, y: clientSnake.y, angle: clientSnake.angle,
                    body: clientSnake.body, score: clientSnake.score, length: clientSnake.length, isBoosting: isBoosting
                });

                // Check collisions with online real players
                for (let id in currentServerPlayers) {
                    if (id !== socket.id) {
                        let p = currentServerPlayers[id];
                        for (let j = 3; j < p.body.length; j++) {
                            let d = Math.sqrt(Math.pow(clientSnake.x - p.body[j].x, 2) + Math.pow(clientSnake.y - p.body[j].y, 2));
                            if (d < clientSnake.currentRadius + 10) {
                                socket.emit('playerExplodedDeath');
                                return;
                            }
                        }
                    }
                }
            }

            // 5. Render Pipeline Draw Matrix
            ctx.fillStyle = '#0a0a1f'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.translate(-clientSnake.x, -clientSnake.y);

            // Render Foods
            let activeFoods = (gameMode === 'offline') ? offlineFoods : currentServerFoods;
            activeFoods.forEach(f => {
                ctx.fillStyle = f.color; ctx.beginPath(); ctx.arc(f.x, f.y, f.radius, 0, Math.PI*2); ctx.fill();
            });

            // Render Opponents
            if (gameMode === 'offline') {
                offlineBots.forEach(b => {
                    b.body.forEach(seg => {
                        ctx.fillStyle = '#ff9900'; ctx.beginPath(); ctx.arc(seg.x, seg.y, b.currentRadius, 0, Math.PI*2); ctx.fill();
                    });
                });
            } else {
                for (let id in currentServerPlayers) {
                    if (id !== socket.id) {
                        let p = currentServerPlayers[id];
                        p.body.forEach(seg => {
                            ctx.fillStyle = '#0066ff'; ctx.beginPath(); ctx.arc(seg.x, seg.y, 15, 0, Math.PI*2); ctx.fill();
                        });
                    }
                }
            }

            // Render Local Main Snake Player
            clientSnake.body.forEach((seg, idx) => {
                ctx.fillStyle = (idx === 0) ? '#00ff77' : '#00ffaa';
                ctx.beginPath(); ctx.arc(seg.x, seg.y, clientSnake.currentRadius, 0, Math.PI*2); ctx.fill();
            });

            ctx.restore();
            document.getElementById('hud-score').innerText = "Score: " + Math.floor(clientSnake.score);

            // Leaderboard Pool Sync Assembly
            let lbPool = [{name: document.getElementById('player-nick').value || "You", score: clientSnake.score, isLocal: true}];
            if (gameMode === 'offline') { offlineBots.forEach(b => lbPool.push({name: b.name, score: b.score})); }
            else { for(let id in currentServerPlayers) { if(id !== socket.id) lbPool.push({name: currentServerPlayers[id].name, score: currentServerPlayers[id].score}); } }
            lbPool.sort((a,b) => b.score - a.score);

            let lbContent = "";
            lbPool.slice(0, 8).forEach((item, idx) => {
                lbContent += `<div class="lb-row ${item.isLocal ? 'active-player' : ''}"><span>${idx+1}. ${item.name}</span><span>${Math.floor(item.score)}</span></div>`;
            });
            document.getElementById('lb-content').innerHTML = lbContent;
        }
    </script>
</body>
</html>
