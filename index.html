<!DOCTYPE html>
<html>
<head>
    <title>Slither.io Pro - Size Synced & Barrier Edition</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #030308; overflow: hidden; font-family: 'Segoe UI', Roboto, sans-serif; user-select: none; color: #fff; touch-action: none; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        
        .ui-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #0f0f24 0%, #03030a 100%);
            z-index: 10;
            transition: opacity 0.4s ease, visibility 0.4s;
        }
        .hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        
        h1 { font-size: 3rem; font-weight: 900; margin: 0 0 15px 0; text-transform: uppercase; letter-spacing: 4px; background: linear-gradient(45deg, #00ffaa, #0077ff, #ff0077); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; }
        h2 { font-size: 1.8rem; margin: 0 0 15px 0; color: #a0aec0; text-transform: uppercase; letter-spacing: 2px; text-align: center; }
        
        .loader-container { width: 80%; max-width: 320px; height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; margin-top: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .loader-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #00ffaa, #00bfff); box-shadow: 0 0 10px #00ffaa; }

        .setup-container { display: flex; flex-direction: row; align-items: center; gap: 20px; background: rgba(255, 255, 255, 0.02); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.06); backdrop-filter: blur(15px); max-width: 90%; flex-wrap: wrap; justify-content: center; }
        .controls-side { display: flex; flex-direction: column; gap: 10px; }
        
        .preview-box { width: 220px; height: 220px; background: #05050f; border: 2px solid #2d2d4d; border-radius: 16px; overflow: hidden; position: relative; box-shadow: inset 0 0 20px rgba(0,0,0,0.9); cursor: pointer; }
        .preview-box.boosting-active { border-color: #ff0055; box-shadow: inset 0 0 25px rgba(255, 0, 85, 0.4); }
        #previewCanvas { width: 100%; height: 100%; display: block; }
        .preview-label { position: absolute; bottom: 8px; left: 0; width: 100%; text-align: center; font-size: 0.75rem; color: #64748b; letter-spacing: 1px; text-transform: uppercase; pointer-events: none; }

        .btn {
            background: linear-gradient(135deg, #17172e 0%, #0d0d1a 100%); border: 1px solid #2e2e54; color: white;
            padding: 12px 25px; margin: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; border-radius: 25px; min-width: 180px; text-align: center;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .btn:hover { background: linear-gradient(135deg, #00ffaa 0%, #00bfff 100%); border-color: #fff; color: #000; }
        
        .option-row { display: flex; align-items: center; justify-content: space-between; width: 280px; background: rgba(255,255,255,0.01); padding: 8px 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.03); }
        .option-label { font-size: 0.9rem; color: #94a3b8; font-weight: 500; }
        .select-btn { background: #131324; border: 1px solid #363659; color: #fff; padding: 6px 12px; border-radius: 8px; cursor: pointer; min-width: 120px; font-size: 0.85rem; font-weight: 600; text-align: center; }

        #server-console-box { width: 90%; max-width: 400px; height: 140px; background: #020207; border: 1px solid #1e1e38; border-radius: 12px; font-family: monospace; padding: 12px; color: #00ffaa; overflow-y: hidden; text-align: left; font-size: 0.8rem; line-height: 1.4; margin-bottom: 15px; }

        #hud { position: absolute; top: 15px; left: 15px; z-index: 5; pointer-events: none; background: rgba(3,3,10,0.8); padding: 12px 18px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.06); display: none; backdrop-filter: blur(8px); }
        #leaderboard { position: absolute; top: 15px; right: 15px; z-index: 5; background: rgba(3,3,10,0.85); padding: 12px 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.06); width: 190px; display: none; font-size: 0.8rem; backdrop-filter: blur(8px); }
        .lb-title { font-weight: 800; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 4px; margin-bottom: 6px; color: #38bdf8; }
        .lb-row { display: flex; justify-content: space-between; margin: 3px 0; color: #cbd5e1; }
        .lb-row.active-player { color: #00ffaa; font-weight: bold; }
        
        .name-input { padding: 10px; width: 260px; border-radius: 10px; border: 1px solid #363659; background: #131324; color: #fff; text-align: center; font-size: 1rem; margin-bottom: 12px; }
    </style>
</head>
<body>

    <div id="screen-splash" class="ui-screen">
        <h1>SLITHER PRO</h1>
        <div class="loader-container"><div id="loader" class="loader-bar"></div></div>
        <p style="color: #4b5563; font-size: 0.8rem; margin-top: 15px; letter-spacing: 2px;">SYNCING ARENA CONTEXT...</p>
    </div>

    <div id="screen-main" class="ui-screen hidden">
        <h1>SLITHER PRO</h1>
        <div class="btn" onclick="openCustomization('offline')">Play Offline</div>
        <div class="btn" onclick="openCustomization('multiplayer')">Multiplayer Mode</div>
    </div>

    <div id="screen-multiplayer-load" class="ui-screen hidden">
        <h2 style="color: #00bfff;">Connecting To Live Cluster</h2>
        <div id="server-console-box"></div>
        <div class="loader-container"><div id="mp-loader" class="loader-bar" style="background:linear-gradient(90deg, #00bfff, #ff00aa)"></div></div>
    </div>

    <div id="screen-offline" class="ui-screen hidden">
        <h2 id="setup-title">Customization</h2>
        <input type="text" id="player-nick" class="name-input" placeholder="Enter Nickname" value="Player_1">
        
        <div class="setup-container">
            <div class="controls-side">
                <div class="option-row" id="diff-row">
                    <div class="option-label">Difficulty</div>
                    <button class="select-btn" id="btn-difficulty" onclick="changeSetting('difficulty')">Medium</button>
                </div>
                <div class="option-row">
                    <div class="option-label">Snake Skin</div>
                    <button class="select-btn" id="btn-skin" onclick="changeSetting('skin')">Neon Stripe</button>
                </div>
                <div class="option-row">
                    <div class="option-label">Body Aura</div>
                    <button class="select-btn" id="btn-effect" onclick="changeSetting('effect')">Plasma Glow</button>
                </div>
                <div class="option-row">
                    <div class="option-label">Arena Style</div>
                    <button class="select-btn" id="btn-map" onclick="changeSetting('map')">Standard Grid</button>
                </div>
            </div>

            <div class="preview-box" id="previewBox">
                <canvas id="previewCanvas"></canvas>
                <div class="preview-label" id="previewLabel">Hold to Boost</div>
            </div>
        </div>

        <div style="margin-top: 20px; display: flex; flex-wrap: wrap; justify-content: center;">
            <div class="btn" onclick="launchSelectedMode()">SPAWN INTO ARENA</div>
            <div class="btn" style="background: #090912; border-color: #222;" onclick="showScreen('screen-main')">Back</div>
        </div>
    </div>

    <div id="screen-gameover" class="ui-screen hidden">
        <h1 style="background: linear-gradient(45deg, #ff3333, #ff7700); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 3.5rem;">GAME OVER</h1>
        <p id="final-score-display" style="font-size: 1.4rem; color: #cbd5e1; margin: 0 0 20px 0;">Final Score: 0</p>
        <div class="btn" onclick="launchSelectedMode()">Play Again</div>
        <div class="btn" style="background: #241414; border-color: #4a2929;" onclick="showScreen('screen-main')">Main Menu</div>
    </div>

    <div id="hud">
        <div id="hud-score" style="font-size: 20px; font-weight: 800; color: #00ffaa;">Score: 0</div>
        <div id="hud-length" style="color: #94a3b8; font-size: 12px;">Length: 45 segments</div>
    </div>

    <div id="leaderboard">
        <div class="lb-title">Live Players</div>
        <div id="lb-content"></div>
    </div>

    <canvas id="game"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        const difficulties = ['Easy', 'Medium', 'Hard'];
        const skins = ['Neon Stripe', 'Cosmic Polka', 'Magma Flow', 'Cyber Grid', 'Glow Phantom', 'Void Nebula', 'Rainbow Pulse'];
        const effects = ['Plasma Glow', 'Fire Storm', 'Neon Shockwave'];
        const maps = ['Standard Grid', 'Deep Space Void', 'Tech Hexagon'];
        
        let config = { difficulty: 'Medium', skin: 'Neon Stripe', effect: 'Plasma Glow', map: 'Standard Grid' };
        let chosenMode = 'offline'; 
        let isMultiplayerArena = false;
        let networkPlayers = {};

        const socket = io({ transports: ['websocket', 'polling'] });

        socket.on('gameStateUpdate', (serverPlayers) => {
            if (!isMultiplayerArena) return;
            for (let id in serverPlayers) {
                if (id !== socket.id) {
                    let sp = serverPlayers[id];
                    if (!networkPlayers[id]) {
                        let initBody = [];
                        let len = sp.length || 45;
                        for(let i=0; i<len; i++) initBody.push({x: sp.x, y: sp.y});
                        networkPlayers[id] = {
                            id: id, name: sp.name, skin: sp.skin,
                            x: sp.x, y: sp.y, targetX: sp.x, targetY: sp.y,
                            angle: sp.angle, score: sp.score, length: len,
                            body: initBody, radius: sp.radius || 15
                        };
                    } else {
                        networkPlayers[id].targetX = sp.x;
                        networkPlayers[id].targetY = sp.y;
                        networkPlayers[id].angle = sp.angle;
                        networkPlayers[id].score = sp.score;
                        networkPlayers[id].length = sp.length || networkPlayers[id].length;
                        networkPlayers[id].skin = sp.skin;
                        networkPlayers[id].radius = sp.radius || 15;
                    }
                }
            }
            for (let id in networkPlayers) {
                if (!serverPlayers[id]) delete networkPlayers[id];
            }
        });

        function showScreen(screenId) {
            document.querySelectorAll('.ui-screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(screenId).classList.remove('hidden');
            if(screenId === 'screen-offline') initPreviewSystem();
            else stopPreviewSystem();
        }

        function openCustomization(mode) {
            chosenMode = mode;
            document.getElementById('setup-title').innerText = mode === 'multiplayer' ? "Multiplayer Mode" : "Offline Mode";
            document.getElementById('diff-row').style.display = mode === 'multiplayer' ? 'none' : 'flex';
            showScreen('screen-offline');
        }

        const consoleLogs = [
            "> Establishing Realtime Stream...",
            "> Synchronizing Arena Session...",
            "> Socket Handshake Confirmed...",
            "> Multi-Device Sync Ready!"
        ];

        function launchSelectedMode() {
            if (chosenMode === 'multiplayer') {
                showScreen('screen-multiplayer-load');
                const consoleBox = document.getElementById('server-console-box');
                consoleBox.innerHTML = "";
                let logIndex = 0;
                
                let logInterval = setInterval(() => {
                    if(logIndex < consoleLogs.length) {
                        consoleBox.innerHTML += consoleLogs[logIndex] + "<br/>";
                        logIndex++;
                    }
                }, 800 / consoleLogs.length);

                let progress = 0;
                let mpLoader = document.getElementById('mp-loader');
                let progressInterval = setInterval(() => {
                    progress += 10;
                    if(progress >= 100) {
                        clearInterval(progressInterval);
                        clearInterval(logInterval);
                        setTimeout(() => {
                            socket.emit('joinMultiplayer', { 
                                name: document.getElementById('player-nick').value, 
                                skin: config.skin,
                                score: 100,
                                length: 45,
                                radius: 15
                            });
                            startGame(true); 
                        }, 100);
                    }
                    mpLoader.style.width = progress + '%';
                }, 30);
            } else {
                startGame(false);
            }
        }

        let loadProgress = 0;
        const loaderInterval = setInterval(() => {
            loadProgress += 10;
            if (loadProgress >= 100) {
                clearInterval(loaderInterval);
                setTimeout(() => showScreen('screen-main'), 100);
            }
            document.getElementById('loader').style.width = loadProgress + '%';
        }, 20);

        function changeSetting(type) {
            if(type === 'difficulty') {
                config.difficulty = difficulties[(difficulties.indexOf(config.difficulty) + 1) % difficulties.length];
                document.getElementById('btn-difficulty').innerText = config.difficulty;
            } else if(type === 'skin') {
                config.skin = skins[(skins.indexOf(config.skin) + 1) % skins.length];
                document.getElementById('btn-skin').innerText = config.skin;
            } else if(type === 'effect') {
                config.effect = effects[(effects.indexOf(config.effect) + 1) % effects.length];
                document.getElementById('btn-effect').innerText = config.effect;
            } else if(type === 'map') {
                config.map = maps[(maps.indexOf(config.map) + 1) % maps.length];
                document.getElementById('btn-map').innerText = config.map;
            }
        }

        function drawSlitherSkin(ctx, x, y, radius, index, skinName, isHead, angle = 0, auraActive = false, auraType = 'Plasma Glow') {
            ctx.save();
            ctx.translate(x, y);

            if (auraActive && !isMobile) {
                ctx.save(); ctx.globalAlpha = 0.45; ctx.shadowBlur = radius * 1.5;
                if (auraType === 'Plasma Glow') { ctx.fillStyle = '#00ffff'; ctx.shadowColor = '#00ffff'; }
                else if (auraType === 'Fire Storm') { ctx.fillStyle = '#ff3300'; ctx.shadowColor = '#ffaa00'; }
                else { ctx.fillStyle = '#ff00aa'; ctx.shadowColor = '#ff00aa'; }
                ctx.beginPath(); ctx.arc(0, 0, radius * 1.35, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }

            if (!isMobile) {
                ctx.shadowColor = "rgba(0, 0, 0, 0.3)";
                ctx.shadowBlur = 6;
            }

            if (skinName === 'Neon Stripe') {
                ctx.fillStyle = (index % 4 < 2) ? '#00ffaa' : '#0066ff';
                ctx.beginPath(); ctx.arc(0, 0, radius, 0, Math.PI*2); ctx.fill();
            } else if (skinName === 'Cosmic Polka') {
                ctx.fillStyle = '#6d28d9';
                ctx.beginPath(); ctx.arc(0, 0, radius, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#f43f5e'; ctx.beginPath(); ctx.arc(-radius*0.2, -radius*0.2, radius*0.25, 0, Math.PI*2); ctx.fill();
            } else if (skinName === 'Magma Flow') {
                let grad = ctx.createRadialGradient(-radius*0.2, -radius*0.2, radius*0.1, 0, 0, radius);
                grad.addColorStop(0, '#facc15'); grad.addColorStop(1, '#450a0a');
                ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(0, 0, radius, 0, Math.PI*2); ctx.fill();
            } else if (skinName === 'Cyber Grid') {
                ctx.fillStyle = '#0f172a'; ctx.beginPath(); ctx.arc(0, 0, radius, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = '#38bdf8'; ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.moveTo(-radius, 0); ctx.lineTo(radius, 0); ctx.stroke();
            } else if (skinName === 'Glow Phantom') {
                ctx.fillStyle = (index % 6 < 3) ? 'rgba(0, 255, 200, 0.8)' : 'rgba(10, 20, 40, 0.9)';
                ctx.beginPath(); ctx.arc(0, 0, radius, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = '#00ffc8'; ctx.lineWidth = 1; ctx.stroke();
            } else if (skinName === 'Void Nebula') {
                let grad = ctx.createRadialGradient(0, 0, 0, 0, 0, radius);
                grad.addColorStop(0, '#ec4899'); grad.addColorStop(0.5, '#3b82f6'); grad.addColorStop(1, '#1e1b4b');
                ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(0, 0, radius, 0, Math.PI*2); ctx.fill();
            } else if (skinName === 'Rainbow Pulse') {
                ctx.fillStyle = `hsl(${(index * 15 + Date.now()/20) % 360}, 90%, 60%)`;
                ctx.beginPath(); ctx.arc(0, 0, radius, 0, Math.PI*2); ctx.fill();
            }

            if (isHead) {
                ctx.rotate(angle); ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(radius * 0.4, -radius * 0.35, radius * 0.3, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(radius * 0.4, radius * 0.35, radius * 0.3, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#000';
                ctx.beginPath(); ctx.arc(radius * 0.45, -radius * 0.35, radius * 0.15, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(radius * 0.45, radius * 0.35, radius * 0.15, 0, Math.PI*2); ctx.fill();
            }
            ctx.restore();
        }

        function drawMapBackground(ctx, mapName, width, height, scale, snakeX, snakeY, MAP_RADIUS, isPreview, localBoostState = false) {
            ctx.save();
            if(!isPreview) {
                ctx.translate(canvas.width / 2, canvas.height / 2); ctx.scale(scale, scale); ctx.translate(-snakeX, -snakeY);
            }
            let viewLeft = isPreview ? 0 : snakeX - canvas.width / scale;
            let viewRight = isPreview ? width : snakeX + canvas.width / scale;
            let viewTop = isPreview ? 0 : snakeY - canvas.height / scale;
            let viewBottom = isPreview ? height : snakeY + canvas.height / scale;

            if (mapName === 'Standard Grid') ctx.fillStyle = localBoostState ? '#0c0717' : '#0a0a1f';
            else if (mapName === 'Deep Space Void') ctx.fillStyle = localBoostState ? '#0a0004' : '#020205';
            else ctx.fillStyle = localBoostState ? '#0d0202' : '#05070a';
            ctx.fillRect(viewLeft, viewTop, viewRight-viewLeft, viewBottom-viewTop);

            ctx.strokeStyle = localBoostState ? 'rgba(0, 255, 255, 0.05)' : 'rgba(255, 255, 255, 0.04)';
            ctx.lineWidth = 1;
            let step = isPreview ? 35 : 120;
            for (let x = Math.floor(viewLeft / step) * step; x < viewRight; x += step) {
                ctx.beginPath(); ctx.moveTo(x, viewTop); ctx.lineTo(x, viewBottom); ctx.stroke();
            }
            for (let y = Math.floor(viewTop / step) * step; y < viewBottom; y += step) {
                ctx.beginPath(); ctx.moveTo(viewLeft, y); ctx.lineTo(viewRight, y); ctx.stroke();
            }

            // --- RED GLOWING BARRIER CIRCLE (4000px Radius) ---
            if (!isPreview) {
                ctx.save();
                ctx.beginPath();
                ctx.arc(0, 0, MAP_RADIUS, 0, Math.PI * 2);
                ctx.strokeStyle = '#ff0055';
                ctx.lineWidth = 14;
                ctx.shadowColor = '#ff0055';
                ctx.shadowBlur = 25;
                ctx.stroke();
                ctx.restore();
            }

            ctx.restore();
        }

        let previewCanvas, previewCtx, previewAnimId;
        let previewSnake = { angle: 0, body: [], isBoosting: false };

        function initPreviewSystem() {
            previewCanvas = document.getElementById('previewCanvas');
            previewCtx = previewCanvas.getContext('2d');
            previewCanvas.width = 220; previewCanvas.height = 220;
            previewSnake.body = [];
            for(let i=0; i<20; i++) previewSnake.body.push({x: 110, y: 110});
            
            let pBox = document.getElementById('previewBox');
            let startBoost = () => { previewSnake.isBoosting = true; pBox.classList.add('boosting-active'); };
            let stopBoost = () => { previewSnake.isBoosting = false; pBox.classList.remove('boosting-active'); };
            pBox.onmousedown = startBoost; pBox.onmouseup = stopBoost; pBox.onmouseleave = stopBoost;
            pBox.ontouchstart = startBoost; pBox.ontouchend = stopBoost;
            runPreviewLoop();
        }
        function stopPreviewSystem() { cancelAnimationFrame(previewAnimId); }

        function runPreviewLoop() {
            previewAnimId = requestAnimationFrame(runPreviewLoop);
            drawMapBackground(previewCtx, config.map, 220, 220, 1, 0, 0, 0, true, previewSnake.isBoosting);
            
            previewSnake.angle += previewSnake.isBoosting ? 0.095 : 0.05;
            let headX = 110 + Math.cos(previewSnake.angle) * 50;
            let headY = 110 + Math.sin(previewSnake.angle) * 40;
            previewSnake.body[0] = {x: headX, y: headY};
            
            for (let i = 1; i < previewSnake.body.length; i++) {
                let dx = previewSnake.body[i].x - previewSnake.body[i-1].x;
                let dy = previewSnake.body[i].y - previewSnake.body[i-1].y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > 5 && dist > 0) {
                    previewSnake.body[i].x = previewSnake.body[i-1].x + (dx / dist) * 5;
                    previewSnake.body[i].y = previewSnake.body[i-1].y + (dy / dist) * 5;
                }
            }

            for (let i = previewSnake.body.length - 1; i >= 0; i--) {
                drawSlitherSkin(previewCtx, previewSnake.body[i].x, previewSnake.body[i].y, 10, i, config.skin, i === 0, previewSnake.angle + Math.PI/2, previewSnake.isBoosting, config.effect);
            }
        }

        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        
        const MAP_RADIUS = 4000; // Fixed 4000px Radius Boundary
        let isGameRunning = false;
        let mouse = { x: window.innerWidth/2, y: window.innerHeight/2 };
        let isBoosting = false;
        let gameLoopId;

        window.addEventListener("mousemove", (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener("mousedown", () => { if(isGameRunning && snake.score > 20) isBoosting = true; });
        window.addEventListener("mouseup", () => { isBoosting = false; });

        window.addEventListener("touchmove", (e) => {
            if (e.touches.length > 0) {
                mouse.x = e.touches[0].clientX;
                mouse.y = e.touches[0].clientY;
            }
        }, { passive: true });
        window.addEventListener("touchstart", (e) => {
            if (e.touches.length > 0) {
                mouse.x = e.touches[0].clientX;
                mouse.y = e.touches[0].clientY;
            }
            if (isGameRunning && snake.score > 20) isBoosting = true;
        });
        window.addEventListener("touchend", () => { isBoosting = false; });

        let snake, foods, bots, cameraScale;

        function createBot() {
            let rAngle = Math.random() * Math.PI * 2;
            let rDist = Math.random() * (MAP_RADIUS - 300);
            let rx = Math.cos(rAngle) * rDist;
            let ry = Math.sin(rAngle) * rDist;

            let bScore = Math.floor(Math.random()*300) + 50;
            let bLength = Math.floor(bScore / 2) + 30;
            
            let botBody = [];
            for(let k=0; k<bLength; k++) botBody.push({x: rx, y: ry});

            let botSpeed = 3.5;
            if (config.difficulty === 'Easy') botSpeed = 2.5;
            if (config.difficulty === 'Hard') botSpeed = 5.0;

            return {
                id: "bot_" + Math.random().toString(36).substr(2, 9),
                x: rx, y: ry, angle: Math.random() * Math.PI * 2,
                maxTurnSpeed: config.difficulty === 'Hard' ? 0.09 : (config.difficulty === 'Easy' ? 0.05 : 0.07),
                skin: skins[Math.floor(Math.random() * skins.length)],
                name: "AI_" + Math.floor(Math.random()*900), 
                score: bScore, length: bLength, targetLength: bLength,
                body: botBody, currentRadius: 15, 
                speed: botSpeed, changeDirTimer: 0
            };
        }

        function convertBodyToFood(body) {
            for (let i = 0; i < body.length; i += 2) {
                foods.push({
                    x: body[i].x + (Math.random() - 0.5) * 10,
                    y: body[i].y + (Math.random() - 0.5) * 10,
                    color: `hsl(${Math.random()*360}, 100%, 75%)`,
                    maxRadius: Math.random() * 3 + 6,
                    value: 2
                });
            }
        }

        function initGameData(multiplayerFlag) {
            isMultiplayerArena = multiplayerFlag;

            let startAngle = Math.random() * Math.PI * 2;
            let startDist = Math.random() * 1000;
            let startX = Math.cos(startAngle) * startDist;
            let startY = Math.sin(startAngle) * startDist;

            snake = { 
                id: "player", name: document.getElementById('player-nick').value || "You", x: startX, y: startY, angle: -Math.PI / 2,
                currentRadius: 15, 
                normalSpeed: 3.5, boostSpeed: 7.0, 
                maxTurnSpeed: 0.08, 
                body: [], length: 45, targetLength: 45, score: 100, isDead: false 
            };
            for(let i=0; i < snake.length; i++) snake.body.push({x: snake.x, y: snake.y});
            
            cameraScale = 1.0; foods = [];
            
            let foodCount = 2200;
            for (let i = 0; i < foodCount; i++) foods.push(createFood(true));

            bots = [];
            if (!isMultiplayerArena) {
                let totalBots = config.difficulty === 'Hard' ? 25 : (config.difficulty === 'Easy' ? 12 : 18);
                for (let i = 0; i < totalBots; i++) {
                    bots.push(createBot());
                }
            }
        }

        function startGame(multiplayerFlag = false) {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            initGameData(multiplayerFlag);
            document.querySelectorAll('.ui-screen').forEach(s => s.classList.add('hidden'));
            document.getElementById('hud').style.display = 'block';
            document.getElementById('leaderboard').style.display = 'block';
            
            isGameRunning = true;
            runGameLoop();
        }

        function triggerGameOver() {
            isGameRunning = false;
            cancelAnimationFrame(gameLoopId);
            document.getElementById('hud').style.display = 'none';
            document.getElementById('leaderboard').style.display = 'none';
            document.getElementById('final-score-display').innerText = "Final Score: " + Math.floor(snake.score);
            showScreen('screen-gameover');
        }

        function enforceBarrier(entity) {
            let dist = Math.hypot(entity.x, entity.y);
            if (dist > MAP_RADIUS - entity.currentRadius) {
                let angle = Math.atan2(entity.y, entity.x);
                entity.x = Math.cos(angle) * (MAP_RADIUS - entity.currentRadius);
                entity.y = Math.sin(angle) * (MAP_RADIUS - entity.currentRadius);
            }
        }

        function runGameLoop() {
            if (!isGameRunning) return;
            gameLoopId = requestAnimationFrame(runGameLoop);

            if (isBoosting) {
                if (snake.score > 20) {
                    snake.score -= 0.35; 
                    if (snake.targetLength > 20 && Math.random() < 0.1) snake.targetLength -= 0.2;
                } else {
                    isBoosting = false; 
                }
            }

            if (snake.length < snake.targetLength) {
                snake.length += 0.15; 
                if (snake.length > snake.targetLength) snake.length = snake.targetLength;
            } else if (snake.length > snake.targetLength) {
                snake.length -= 0.2;
                if (snake.length < snake.targetLength) snake.length = snake.targetLength;
            }

            let targetAngle = Math.atan2(mouse.y - canvas.height/2, mouse.x - canvas.width/2);
            let angleDiff = targetAngle - snake.angle;
            while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
            while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
            
            snake.angle += Math.max(-snake.maxTurnSpeed, Math.min(snake.maxTurnSpeed, angleDiff));

            let currentSpeed = isBoosting ? snake.boostSpeed : snake.normalSpeed;
            snake.x += Math.cos(snake.angle) * currentSpeed;
            snake.y += Math.sin(snake.angle) * currentSpeed;

            // Enforce 4000px Radius Barrier on Player
            enforceBarrier(snake);

            let head = {x: snake.x, y: snake.y};
            snake.body[0] = head;

            let spacing = 6; 
            for (let i = 1; i < snake.body.length; i++) {
                let dx = snake.body[i].x - snake.body[i-1].x;
                let dy = snake.body[i].y - snake.body[i-1].y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > spacing && dist > 0) {
                    snake.body[i].x = snake.body[i-1].x + (dx / dist) * spacing;
                    snake.body[i].y = snake.body[i-1].y + (dy / dist) * spacing;
                }
            }

            let currentIntLength = Math.floor(snake.length);
            while(snake.body.length < currentIntLength) {
                let last = snake.body[snake.body.length - 1] || head;
                snake.body.push({x: last.x, y: last.y});
            }
            while(snake.body.length > currentIntLength) {
                snake.body.pop();
            }

            // Sync Full Size Attributes to Server in Multiplayer
            if (isMultiplayerArena) {
                socket.emit('updatePlayer', {
                    x: snake.x, 
                    y: snake.y, 
                    angle: snake.angle, 
                    score: snake.score,
                    length: Math.floor(snake.length),
                    radius: snake.currentRadius
                });
            }

            // --- AI BOTS LOGIC (OFFLINE MODE) ---
            if (!isMultiplayerArena) {
                for (let bIdx = bots.length - 1; bIdx >= 0; bIdx--) {
                    let b = bots[bIdx];
                    b.changeDirTimer--;
                    if (b.changeDirTimer <= 0) {
                        b.changeDirTimer = Math.floor(Math.random() * 40) + 20;
                        if (config.difficulty === 'Hard' && Math.random() < 0.6) {
                            let interceptX = snake.x + Math.cos(snake.angle) * 60;
                            let interceptY = snake.y + Math.sin(snake.angle) * 60;
                            b.targetAngle = Math.atan2(interceptY - b.y, interceptX - b.x);
                        } else {
                            b.targetAngle = Math.random() * Math.PI * 2;
                        }
                    }

                    let bAngleDiff = b.targetAngle - b.angle;
                    while (bAngleDiff < -Math.PI) bAngleDiff += Math.PI * 2;
                    while (bAngleDiff > Math.PI) bAngleDiff -= Math.PI * 2;
                    b.angle += Math.max(-b.maxTurnSpeed, Math.min(b.maxTurnSpeed, bAngleDiff));

                    b.x += Math.cos(b.angle) * b.speed;
                    b.y += Math.sin(b.angle) * b.speed;

                    // Enforce Barrier on Bots
                    enforceBarrier(b);

                    b.body[0] = {x: b.x, y: b.y};
                    for (let j = 1; j < b.body.length; j++) {
                        let dx = b.body[j].x - b.body[j-1].x;
                        let dy = b.body[j].y - b.body[j-1].y;
                        let dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist > spacing && dist > 0) {
                            b.body[j].x = b.body[j-1].x + (dx / dist) * spacing;
                            b.body[j].y = b.body[j-1].y + (dy / dist) * spacing;
                        }
                    }

                    // Bot eats food
                    for (let fIdx = foods.length - 1; fIdx >= 0; fIdx--) {
                        let f = foods[fIdx];
                        let dist = Math.sqrt(Math.pow(b.x - f.x, 2) + Math.pow(b.y - f.y, 2));
                        if (dist < b.currentRadius + 6) {
                            b.score += f.value;
                            b.targetLength += 0.2;
                            foods[fIdx] = createFood(false);
                        }
                    }

                    // Player Head Hits Bot Body -> Player Dies
                    for (let j = 2; j < b.body.length; j++) {
                        let dist = Math.sqrt(Math.pow(snake.x - b.body[j].x, 2) + Math.pow(snake.y - b.body[j].y, 2));
                        if (dist < snake.currentRadius + 10) {
                            convertBodyToFood(snake.body);
                            triggerGameOver();
                            return;
                        }
                    }

                    // Bot Head Hits Player Body -> Bot Dies
                    let botDied = false;
                    for (let j = 2; j < snake.body.length; j++) {
                        let dist = Math.sqrt(Math.pow(b.x - snake.body[j].x, 2) + Math.pow(b.y - snake.body[j].y, 2));
                        if (dist < b.currentRadius + 10) {
                            convertBodyToFood(b.body);
                            bots.splice(bIdx, 1);
                            bots.push(createBot());
                            botDied = true;
                            break;
                        }
                    }
                    if (botDied) continue;
                }
            }

            // --- MULTIPLAYER OPPONENTS LOGIC (ACCURATE SIZE SYNC) ---
            if (isMultiplayerArena) {
                for (let id in networkPlayers) {
                    let p = networkPlayers[id];
                    p.x += (p.targetX - p.x) * 0.25;
                    p.y += (p.targetY - p.y) * 0.25;
                    p.body[0] = {x: p.x, y: p.y};

                    let targetLen = p.length || 45;
                    while(p.body.length < targetLen) p.body.push({x: p.x, y: p.y});
                    while(p.body.length > targetLen) p.body.pop();

                    for (let j = 1; j < p.body.length; j++) {
                        let dx = p.body[j].x - p.body[j-1].x;
                        let dy = p.body[j].y - p.body[j-1].y;
                        let dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist > spacing && dist > 0) {
                            p.body[j].x = p.body[j-1].x + (dx / dist) * spacing;
                            p.body[j].y = p.body[j-1].y + (dy / dist) * spacing;
                        }
                    }

                    // Player Head Hits Opponent Body
                    for (let j = 2; j < p.body.length; j++) {
                        let dist = Math.sqrt(Math.pow(snake.x - p.body[j].x, 2) + Math.pow(snake.y - p.body[j].y, 2));
                        if (dist < snake.currentRadius + 10) {
                            convertBodyToFood(snake.body);
                            triggerGameOver();
                            return;
                        }
                    }
                }
            }

            // Player Food Collection (5 Foods = 1 Segment)
            for (let i = foods.length - 1; i >= 0; i--) {
                let f = foods[i];
                let dist = Math.sqrt(Math.pow(snake.x - f.x, 2) + Math.pow(snake.y - f.y, 2));
                if (dist < snake.currentRadius + 8) {
                    snake.score += f.value;
                    snake.targetLength += 0.2; // 5 foods = 1 segment
                    foods[i] = createFood(false);
                }
            }

            drawMapBackground(ctx, config.map, canvas.width, canvas.height, cameraScale, snake.x, snake.y, MAP_RADIUS, false, isBoosting);

            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.scale(cameraScale, cameraScale);
            ctx.translate(-snake.x, -snake.y);

            foods.forEach(f => {
                ctx.fillStyle = f.color; ctx.beginPath(); ctx.arc(f.x, f.y, f.maxRadius, 0, Math.PI*2); ctx.fill();
            });

            // Draw Offline Bots
            if (!isMultiplayerArena) {
                bots.forEach(b => {
                    for (let j = b.body.length - 1; j >= 0; j--) {
                        drawSlitherSkin(ctx, b.body[j].x, b.body[j].y, b.currentRadius, j, b.skin, j === 0, b.angle + Math.PI/2, false, config.effect);
                    }
                });
            }

            // Draw Multiplayer Opponents (Synced Radius & Length)
            if (isMultiplayerArena) {
                for (let id in networkPlayers) {
                    let p = networkPlayers[id];
                    if (p.body && p.body.length > 0) {
                        let drawRadius = p.radius || 15;
                        for (let j = p.body.length - 1; j >= 0; j--) {
                            drawSlitherSkin(ctx, p.body[j].x, p.body[j].y, drawRadius, j, p.skin, j === 0, p.angle + Math.PI/2, false, config.effect);
                        }
                    }
                }
            }

            // Draw Local Player
            for (let i = snake.body.length - 1; i >= 0; i--) {
                drawSlitherSkin(ctx, snake.body[i].x, snake.body[i].y, snake.currentRadius, i, config.skin, i === 0, snake.angle + Math.PI/2, isBoosting, config.effect);
            }

            ctx.restore();

            document.getElementById('hud-score').innerText = "Score: " + Math.floor(snake.score);
            document.getElementById('hud-length').innerText = "Length: " + Math.floor(snake.length) + " segments";

            // Leaderboard
            let sortedScores = [];
            sortedScores.push({name: snake.name, score: snake.score, isLocal: true});
            if (isMultiplayerArena) {
                for (let id in networkPlayers) {
                    sortedScores.push({name: networkPlayers[id].name, score: networkPlayers[id].score});
                }
            } else {
                bots.forEach(b => sortedScores.push({name: b.name, score: b.score}));
            }
            sortedScores.sort((a,b) => b.score - a.score);

            let lbContent = "";
            sortedScores.slice(0, 10).forEach((item, idx) => {
                lbContent += `<div class="lb-row ${item.isLocal ? 'active-player' : ''}">
                    <span>${idx+1}. ${item.name}</span>
                    <span>${Math.floor(item.score)}</span>
                </div>`;
            });
            document.getElementById('lb-content').innerHTML = lbContent;
        }

        function createFood(isInitial = false) {
            let maxRadius = Math.random() * 2 + 4;
            let rAngle = Math.random() * Math.PI * 2;
            let rDist = Math.random() * (MAP_RADIUS - 100);
            return {
                x: Math.cos(rAngle) * rDist,
                y: Math.sin(rAngle) * rDist,
                color: `hsl(${Math.random()*360},100%, 65%)`,
                maxRadius: maxRadius, value: Math.floor(maxRadius * 2)
            };
        }
    </script>
</body>
