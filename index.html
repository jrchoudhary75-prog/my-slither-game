<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Advanced Slither Game</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0d0f18;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #game-canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle, #1a1c2e 0%, #0a0b12 100%);
        }

        /* Responsive UI Overlay Elements */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* Dynamic Scoreboard - Transparent & Non-Overlapping */
        .score-board {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 10px 18px;
            border-radius: 12px;
            color: #ffffff;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            pointer-events: auto;
            transition: all 0.3s ease;
        }

        .score-board div {
            margin: 3px 0;
        }

        .score-val {
            color: #00ffcc;
            font-weight: 700;
        }

        /* Leaderboard - Clean Right Positioning & Transparency */
        .leaderboard {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 200px;
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 12px;
            border-radius: 12px;
            color: #ffffff;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            pointer-events: auto;
        }

        .leaderboard h3 {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ffaa00;
            margin-bottom: 8px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 5px;
        }

        .leaderboard ol {
            list-style-position: inside;
            font-size: 12px;
        }

        .leaderboard li {
            margin: 4px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            justify-content: space-between;
        }

        .leaderboard .p-name {
            color: #e2e8f0;
            max-width: 110px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .leaderboard .p-score {
            color: #00ffcc;
            font-weight: 600;
        }

        /* Mobile Adjustments: Stack score & leaderboard cleanly so they NEVER overlap */
        @media (max-width: 768px) {
            .score-board {
                top: 10px;
                left: 10px;
                padding: 8px 12px;
                font-size: 12px;
                background: rgba(15, 23, 42, 0.55);
            }

            .leaderboard {
                top: 10px;
                right: 10px;
                width: 140px;
                padding: 8px;
                background: rgba(15, 23, 42, 0.55);
            }

            .leaderboard h3 {
                font-size: 11px;
                margin-bottom: 4px;
            }

            .leaderboard ol {
                font-size: 10px;
            }

            .leaderboard .p-name {
                max-width: 75px;
            }
        }

        #boost-btn {
            display: none;
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 70px;
            height: 70px;
            background: radial-gradient(circle, #ff416c, #ff4b2b);
            border-radius: 50%;
            color: white;
            font-weight: bold;
            font-size: 12px;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(255, 75, 43, 0.5);
            pointer-events: auto;
            border: none;
            outline: none;
        }
    </style>
</head>
<body>

    <canvas id="game-canvas"></canvas>

    <div class="ui-layer">
        <div class="score-board">
            <div>Score: <span id="score-val" class="score-val">100</span></div>
            <div>Length: <span id="length-val" class="score-val">45</span></div>
            <div>Rank: <span id="rank-val" class="score-val">#1</span></div>
        </div>

        <div class="leaderboard">
            <h3>Leaderboard</h3>
            <ol id="leader-list">
                <!-- Dynamic Content -->
            </ol>
        </div>

        <button id="boost-btn">BOOST</button>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');

        // Screen Dimensions & Dynamic Responsive Camera Zoom
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0) || width <= 768;

        // Mobile Zoom-Out: Give mobile players wider view range
        let cameraZoom = isMobile ? 0.65 : 1.0; 

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            const checkMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0) || width <= 768;
            cameraZoom = checkMobile ? 0.65 : 1.0;
        });

        // Map Setup
        const MAP_RADIUS = 4000;
        const FOOD_COUNT = 2200;

        // Food Storage with Scattered Distribution
        const foods = [];

        function generateScatteredFood() {
            foods.length = 0;
            
            // 1. Random clusters (Food concentrated in natural patches)
            const clusterCount = 35;
            for (let c = 0; c < clusterCount; c++) {
                const cx = (Math.random() - 0.5) * (MAP_RADIUS * 1.7);
                const cy = (Math.random() - 0.5) * (MAP_RADIUS * 1.7);
                const clusterItems = Math.floor(Math.random() * 30) + 15;

                for (let i = 0; i < clusterItems; i++) {
                    const offsetAngle = Math.random() * Math.PI * 2;
                    const offsetDist = Math.pow(Math.random(), 0.5) * 180;

                    const fx = cx + Math.cos(offsetAngle) * offsetDist;
                    const fy = cy + Math.sin(offsetAngle) * offsetDist;

                    if (Math.hypot(fx, fy) < MAP_RADIUS - 50) {
                        foods.push({
                            x: fx,
                            y: fy,
                            size: Math.random() * 4 + 3,
                            color: `hsl(${Math.random() * 360}, 100%, 65%)`
                        });
                    }
                }
            }

            // 2. Completely random scattered food across entire arena
            while (foods.length < FOOD_COUNT) {
                const rx = (Math.random() - 0.5) * MAP_RADIUS * 1.9;
                const ry = (Math.random() - 0.5) * MAP_RADIUS * 1.9;

                if (Math.hypot(rx, ry) < MAP_RADIUS - 50) {
                    foods.push({
                        x: rx,
                        y: ry,
                        size: Math.random() * 3.5 + 2.5,
                        color: `hsl(${Math.random() * 360}, 90%, 60%)`
                    });
                }
            }
        }

        // Snake / Player Engine
        class Snake {
            constructor(id, name, color, isAI = false) {
                this.id = id;
                this.name = name;
                this.color = color;
                this.isAI = isAI;

                const spawnAngle = Math.random() * Math.PI * 2;
                const spawnDist = Math.random() * (MAP_RADIUS - 500);
                this.x = Math.cos(spawnAngle) * spawnDist;
                this.y = Math.sin(spawnAngle) * spawnDist;

                this.angle = Math.random() * Math.PI * 2;
                this.targetAngle = this.angle;
                this.speed = 3.2;
                this.boostSpeed = 6.8;
                this.isBoosting = false;
                this.radius = 14;
                this.score = 100;

                this.body = [];
                this.segmentSpacing = 8;
                this.targetLength = 40;

                for (let i = 0; i < this.targetLength; i++) {
                    this.body.push({ x: this.x - i * this.segmentSpacing, y: this.y });
                }

                this.aiState = 'PATROL';
                this.aiTarget = null;
                this.aiTimer = 0;
            }

            update() {
                const currentSpeed = this.isBoosting && this.score > 20 ? this.boostSpeed : this.speed;

                if (this.isBoosting && this.score > 20) {
                    this.score -= 0.08;
                    this.targetLength = Math.max(25, 40 + (this.score - 100) / 4);

                    if (Math.random() < 0.2 && this.body.length > 5) {
                        const tail = this.body[this.body.length - 1];
                        foods.push({
                            x: tail.x + (Math.random() - 0.5) * 10,
                            y: tail.y + (Math.random() - 0.5) * 10,
                            size: 4.5,
                            color: this.color
                        });
                    }
                }

                let angleDiff = this.targetAngle - this.angle;
                while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                this.angle += angleDiff * 0.12;

                this.x += Math.cos(this.angle) * currentSpeed;
                this.y += Math.sin(this.angle) * currentSpeed;

                const distFromCenter = Math.hypot(this.x, this.y);
                if (distFromCenter > MAP_RADIUS - this.radius) {
                    const centerAngle = Math.atan2(-this.y, -this.x);
                    this.targetAngle = centerAngle;
                    if (distFromCenter > MAP_RADIUS) {
                        this.x = Math.cos(centerAngle) * (-MAP_RADIUS);
                        this.y = Math.sin(centerAngle) * (-MAP_RADIUS);
                    }
                }

                this.body.unshift({ x: this.x, y: this.y });

                while (this.body.length > this.targetLength) {
                    this.body.pop();
                }

                if (this.isAI) {
                    this.runAdvancedAI();
                }
            }

            // High-Performance Advanced Tactical AI Engine
            runAdvancedAI() {
                this.aiTimer++;

                let immediateDanger = false;
                let dangerAvoidAngle = 0;
                let closestTrapVictim = null;
                let trapMinDistance = 450;

                const lookAheadDist = this.isBoosting ? 180 : 120;
                const probeX = this.x + Math.cos(this.angle) * lookAheadDist;
                const probeY = this.y + Math.sin(this.angle) * lookAheadDist;

                for (let other of snakes) {
                    if (other.id === this.id) continue;

                    // A. Avoid Collisions with other bodies
                    for (let i = 0; i < other.body.length; i += 2) {
                        const seg = other.body[i];
                        const distToHead = Math.hypot(this.x - seg.x, this.y - seg.y);
                        const distToProbe = Math.hypot(probeX - seg.x, probeY - seg.y);

                        if (distToProbe < this.radius + 35 || distToHead < this.radius + 40) {
                            immediateDanger = true;
                            const escapeAngle = Math.atan2(this.y - seg.y, this.x - seg.x);
                            dangerAvoidAngle += escapeAngle;
                        }
                    }

                    // B. Cutoff / Trapping Strategy (Aggressive Offense)
                    const distToOtherHead = Math.hypot(this.x - other.x, this.y - other.y);
                    if (distToOtherHead < trapMinDistance && !immediateDanger) {
                        const enemyFutureX = other.x + Math.cos(other.angle) * 100;
                        const enemyFutureY = other.y + Math.sin(other.angle) * 100;

                        if (this.score > other.score * 0.7) {
                            closestTrapVictim = { x: enemyFutureX, y: enemyFutureY };
                            trapMinDistance = distToOtherHead;
                        }
                    }
                }

                // DEFENSIVE: Evasion Strategy
                if (immediateDanger) {
                    this.targetAngle = dangerAvoidAngle;
                    this.isBoosting = true;
                    return;
                } else {
                    this.isBoosting = false;
                }

                // OFFENSIVE: Trapping Strategy
                if (closestTrapVictim && Math.random() < 0.65) {
                    const angleToInterception = Math.atan2(closestTrapVictim.y - this.y, closestTrapVictim.x - this.x);
                    this.targetAngle = angleToInterception;

                    if (trapMinDistance < 250) {
                        this.isBoosting = true;
                    }
                    return;
                }

                // FORAGING / SCATTERED FOOD
                if (this.aiTimer % 15 === 0 || !this.aiTarget) {
                    let nearestFood = null;
                    let minDist = 300;

                    for (let f of foods) {
                        const d = Math.hypot(this.x - f.x, this.y - f.y);
                        if (d < minDist) {
                            minDist = d;
                            nearestFood = f;
                        }
                    }

                    if (nearestFood) {
                        this.aiTarget = nearestFood;
                        this.targetAngle = Math.atan2(nearestFood.y - this.y, nearestFood.x - this.x);
                    } else if (Math.random() < 0.1) {
                        this.targetAngle += (Math.random() - 0.5) * 1.5;
                    }
                }
            }

            draw(cameraX, cameraY, zoom) {
                for (let i = this.body.length - 1; i >= 0; i--) {
                    const seg = this.body[i];
                    const screenX = (seg.x - cameraX) * zoom + width / 2;
                    const screenY = (seg.y - cameraY) * zoom + height / 2;

                    if (screenX < -50 || screenX > width + 50 || screenY < -50 || screenY > height + 50) continue;

                    ctx.beginPath();
                    ctx.arc(screenX, screenY, (this.radius - (i / this.body.length) * 4) * zoom, 0, Math.PI * 2);
                    ctx.fillStyle = i === 0 ? '#ffffff' : this.color;
                    ctx.shadowBlur = i === 0 ? 12 : 0;
                    ctx.shadowColor = this.color;
                    ctx.fill();
                    ctx.closePath();
                    ctx.shadowBlur = 0;
                }

                const headScreenX = (this.x - cameraX) * zoom + width / 2;
                const headScreenY = (this.y - cameraY) * zoom + height / 2;

                ctx.font = `${Math.max(10, 12 * zoom)}px sans-serif`;
                ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
                ctx.textAlign = 'center';
                ctx.fillText(this.name, headScreenX, headScreenY - (this.radius + 10) * zoom);
            }
        }

        // Game Instantiation
        const player = new Snake('player', 'You (Pro)', '#00ffcc', false);
        const snakes = [player];

        const botNames = ['ViperX', 'ShadowCob', 'TitanSnake', 'ApexPredator', 'NeonStrike', 'VenomMaster', 'AlphaOmega', 'ZeroLag'];
        const botColors = ['#ff3366', '#ff9900', '#33cc33', '#9933ff', '#00ccff', '#ffff33', '#ff33cc', '#00ff99'];

        for (let i = 0; i < botNames.length; i++) {
            snakes.push(new Snake(`bot_${i}`, botNames[i], botColors[i], true));
        }

        generateScatteredFood();

        // Controls
        let mouseX = width / 2;
        let mouseY = height / 2;

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            const dx = mouseX - width / 2;
            const dy = mouseY - height / 2;
            player.targetAngle = Math.atan2(dy, dx);
        });

        window.addEventListener('mousedown', () => player.isBoosting = true);
        window.addEventListener('mouseup', () => player.isBoosting = false);

        const boostBtn = document.getElementById('boost-btn');
        if (isMobile) {
            boostBtn.style.display = 'flex';
            
            boostBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                player.isBoosting = true;
            });
            boostBtn.addEventListener('touchend', (e) => {
                e.preventDefault();
                player.isBoosting = false;
            });

            window.addEventListener('touchmove', (e) => {
                if (e.touches.length > 0) {
                    const touch = e.touches[0];
                    const dx = touch.clientX - width / 2;
                    const dy = touch.clientY - height / 2;
                    player.targetAngle = Math.atan2(dy, dx);
                }
            }, { passive: true });
        }

        // Game Loop
        function gameLoop() {
            ctx.clearRect(0, 0, width, height);

            for (let i = 0; i < snakes.length; i++) {
                snakes[i].update();
            }

            // Food Collisions
            for (let i = foods.length - 1; i >= 0; i--) {
                const f = foods[i];

                for (let s of snakes) {
                    const dist = Math.hypot(s.x - f.x, s.y - f.y);
                    if (dist < s.radius + f.size) {
                        s.score += f.size * 0.8;
                        s.targetLength = 40 + (s.score - 100) / 3;
                        foods.splice(i, 1);

                        if (foods.length < FOOD_COUNT) {
                            const newAngle = Math.random() * Math.PI * 2;
                            const newDist = Math.random() * (MAP_RADIUS - 100);
                            foods.push({
                                x: Math.cos(newAngle) * newDist,
                                y: Math.sin(newAngle) * newDist,
                                size: Math.random() * 3.5 + 2.5,
                                color: `hsl(${Math.random() * 360}, 90%, 60%)`
                            });
                        }
                        break;
                    }
                }
            }

            // Head-Body Collision
            for (let i = 0; i < snakes.length; i++) {
                const s1 = snakes[i];

                for (let j = 0; j < snakes.length; j++) {
                    if (i === j) continue;
                    const s2 = snakes[j];

                    for (let k = 1; k < s2.body.length; k++) {
                        const seg = s2.body[k];
                        const collisionDist = Math.hypot(s1.x - seg.x, s1.y - seg.y);

                        if (collisionDist < s1.radius + 2) {
                            for (let b = 0; b < s1.body.length; b += 2) {
                                const deadSeg = s1.body[b];
                                foods.push({
                                    x: deadSeg.x + (Math.random() - 0.5) * 20,
                                    y: deadSeg.y + (Math.random() - 0.5) * 20,
                                    size: 5.5,
                                    color: s1.color
                                });
                            }

                            if (s1.id === 'player') {
                                alert("Game Over! Score: " + Math.floor(s1.score));
                                location.reload();
                            } else {
                                snakes[i] = new Snake(s1.id, s1.name, s1.color, true);
                            }
                            break;
                        }
                    }
                }
            }

            const camX = player.x;
            const camY = player.y;

            // Map Border
            ctx.beginPath();
            ctx.arc((0 - camX) * cameraZoom + width / 2, (0 - camY) * cameraZoom + height / 2, MAP_RADIUS * cameraZoom, 0, Math.PI * 2);
            ctx.strokeStyle = '#ff3366';
            ctx.lineWidth = 6 * cameraZoom;
            ctx.stroke();

            // Render Food
            for (let f of foods) {
                const fx = (f.x - camX) * cameraZoom + width / 2;
                const fy = (f.y - camY) * cameraZoom + height / 2;

                if (fx > -20 && fx < width + 20 && fy > -20 && fy < height + 20) {
                    ctx.beginPath();
                    ctx.arc(fx, fy, f.size * cameraZoom, 0, Math.PI * 2);
                    ctx.fillStyle = f.color;
                    ctx.fill();
                }
            }

            // Render Snakes
            for (let s of snakes) {
                s.draw(camX, camY, cameraZoom);
            }

            // Update UI Scoreboard & Leaderboard
            document.getElementById('score-val').innerText = Math.floor(player.score);
            document.getElementById('length-val').innerText = Math.floor(player.targetLength);

            const sorted = [...snakes].sort((a, b) => b.score - a.score);
            const playerRank = sorted.findIndex(s => s.id === 'player') + 1;
            document.getElementById('rank-val').innerText = '#' + playerRank;

            const leaderList = document.getElementById('leader-list');
            leaderList.innerHTML = '';
            for (let idx = 0; idx < Math.min(5, sorted.length); idx++) {
                const item = sorted[idx];
                const li = document.createElement('li');
                li.innerHTML = `<span class="p-name">${idx + 1}. ${item.name}</span> <span class="p-score">${Math.floor(item.score)}</span>`;
                leaderList.appendChild(li);
            }

            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
